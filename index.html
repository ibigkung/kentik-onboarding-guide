<!DOCTYPE html>
<html lang="en" x-data="app()" :class="{ 'dark': darkMode }" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kentik Enablement Portal</title>
<script>window.tailwind = { config: {} };</script>
<script src="https://cdn.tailwindcss.com/3.4.1"></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        navy: { 950: '#020818', 900: '#040d24', 800: '#071038', 700: '#0a1650', 600: '#0e1f6e' },
        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' },
        electric: { 400: '#60a5fa', 500: '#3b82f6' },
      },
      fontFamily: {
        sans: ['Space Grotesk', 'Sarabun', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
        th: ['Sarabun', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  :root {
    --glow-cyan: 0 0 20px rgba(34,211,238,0.4), 0 0 40px rgba(34,211,238,0.15);
    --glow-blue: 0 0 20px rgba(96,165,250,0.4), 0 0 40px rgba(96,165,250,0.1);
    --glow-ibigkung: 0 0 15px rgba(34,211,238,0.6), 0 0 30px rgba(96,165,250,0.3), 0 0 60px rgba(139,92,246,0.2);
    --grid-color: rgba(34,211,238,0.04);
    --border-glow: rgba(34,211,238,0.25);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: #020818;
    font-family: 'Space Grotesk', 'Sarabun', sans-serif;
    overflow-x: hidden;
  }

  .light body { background: #f0f4ff; }

  /* Grid background */
  .bg-grid {
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow effects */
  .glow-cyan { box-shadow: var(--glow-cyan); }
  .glow-blue { box-shadow: var(--glow-blue); }
  .text-glow-cyan { text-shadow: 0 0 20px rgba(34,211,238,0.8), 0 0 40px rgba(34,211,238,0.4); }
  .text-glow-ibigkung {
    background: linear-gradient(135deg, #22d3ee, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 8px rgba(34,211,238,0.5));
  }

  /* Cards */
  .card-dark {
    background: linear-gradient(135deg, rgba(7,16,56,0.9) 0%, rgba(4,13,36,0.95) 100%);
    border: 1px solid rgba(34,211,238,0.12);
    backdrop-filter: blur(12px);
  }
  .card-light {
    background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(240,244,255,0.9) 100%);
    border: 1px solid rgba(14,31,110,0.12);
    box-shadow: 0 4px 24px rgba(14,31,110,0.08);
  }
  .card-hover-dark:hover {
    border-color: rgba(34,211,238,0.35);
    box-shadow: var(--glow-cyan);
    transform: translateY(-2px);
  }
  .card-hover-light:hover {
    border-color: rgba(59,130,246,0.4);
    box-shadow: 0 8px 32px rgba(14,31,110,0.15);
    transform: translateY(-2px);
  }

  /* Sidebar */
  .sidebar-item-active-dark {
    background: linear-gradient(90deg, rgba(34,211,238,0.15), rgba(34,211,238,0.05));
    border-left: 2px solid #22d3ee;
    color: #22d3ee;
  }
  .sidebar-item-active-light {
    background: linear-gradient(90deg, rgba(59,130,246,0.12), rgba(59,130,246,0.04));
    border-left: 2px solid #3b82f6;
    color: #1d4ed8;
  }

  /* Architecture diagram */
  .arch-node-dark {
    background: linear-gradient(135deg, rgba(10,22,80,0.95), rgba(7,16,56,0.9));
    border: 1px solid rgba(34,211,238,0.25);
  }
  .arch-node-light {
    background: linear-gradient(135deg, rgba(239,246,255,0.98), rgba(219,234,254,0.9));
    border: 1px solid rgba(59,130,246,0.3);
  }

  /* Arrow */
  .arch-arrow { position: relative; }
  .arch-arrow::after {
    content: '';
    position: absolute;
    top: 50%;
    right: -8px;
    transform: translateY(-50%);
    border: 6px solid transparent;
    border-left-color: #22d3ee;
  }

  /* Pulse animation */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.8; }
    70% { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  @keyframes flow-data {
    0% { stroke-dashoffset: 100; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes dot-flow {
    0% { offset-distance: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .animate-slide-in { animation: slide-in 0.3s ease forwards; }
  .animate-fade-up { animation: fade-up 0.4s ease forwards; }
  .animate-glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }

  .pulse-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(34,211,238,0.5);
    animation: pulse-ring 2s ease-out infinite;
  }

  /* Flow animation on SVG */
  .flow-line {
    stroke-dasharray: 8 4;
    animation: flow-data 1.5s linear infinite;
  }

  /* Badge */
  .badge-cyan {
    background: linear-gradient(135deg, rgba(34,211,238,0.2), rgba(34,211,238,0.08));
    border: 1px solid rgba(34,211,238,0.3);
    color: #22d3ee;
  }
  .badge-blue {
    background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(96,165,250,0.08));
    border: 1px solid rgba(96,165,250,0.3);
    color: #60a5fa;
  }
  .badge-green {
    background: linear-gradient(135deg, rgba(52,211,153,0.2), rgba(52,211,153,0.08));
    border: 1px solid rgba(52,211,153,0.3);
    color: #34d399;
  }
  .badge-amber {
    background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(251,191,36,0.08));
    border: 1px solid rgba(251,191,36,0.3);
    color: #fbbf24;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #020818; }
  ::-webkit-scrollbar-thumb { background: rgba(34,211,238,0.3); border-radius: 3px; }

  .light ::-webkit-scrollbar-track { background: #f0f4ff; }
  .light ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.4); }

  /* Transition */
  .transition-all-300 { transition: all 0.3s ease; }

  /* Mobile sidebar overlay */
  .sidebar-overlay { backdrop-filter: blur(4px); }

  /* Checklist step */
  .step-connector-dark { background: linear-gradient(180deg, #22d3ee, rgba(34,211,238,0.1)); }
  .step-connector-light { background: linear-gradient(180deg, #3b82f6, rgba(59,130,246,0.1)); }

  /* KB Tag */
  .kb-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Header glass */
  .header-glass-dark {
    background: rgba(2,8,24,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(34,211,238,0.1);
  }
  .header-glass-light {
    background: rgba(240,244,255,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(59,130,246,0.15);
    box-shadow: 0 2px 20px rgba(14,31,110,0.08);
  }

  /* IBIGKUNG footer glow */
  .ibigkung-glow {
    animation: glow-pulse 3s ease-in-out infinite;
  }
  .ibigkung-shimmer {
    background: linear-gradient(90deg, #22d3ee, #60a5fa, #a78bfa, #60a5fa, #22d3ee);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* Responsive sidebar */
  @media (max-width: 768px) {
    .sidebar-mobile { transform: translateX(-100%); transition: transform 0.3s ease; }
    .sidebar-mobile.open { transform: translateX(0); }
  }

  .arch-diagram-svg .data-dot {
    animation: dot-flow 3s ease-in-out infinite;
    offset-path: path('M 60 120 L 160 120');
  }
</style>
</head>

<body class="min-h-screen transition-colors duration-300"
  :class="darkMode ? 'bg-navy-950 text-slate-100' : 'bg-blue-50 text-slate-800'">

<div class="bg-grid fixed inset-0 pointer-events-none" :class="darkMode ? 'opacity-100' : 'opacity-30'"></div>

<!-- Mobile overlay -->
<div x-show="sidebarOpen && isMobile" @click="sidebarOpen = false"
  class="sidebar-overlay fixed inset-0 bg-black/60 z-20 md:hidden"
  x-transition:enter="transition-opacity duration-300"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition-opacity duration-300"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0">
</div>

<!-- ═══════════════════════════════════════════════════ HEADER ═══ -->
<header class="fixed top-0 left-0 right-0 z-30 h-14 flex items-center px-4 md:px-6"
  :class="darkMode ? 'header-glass-dark' : 'header-glass-light'">
  <div class="flex items-center gap-3 flex-1">
    <!-- Hamburger (mobile) -->
    <button @click="sidebarOpen = !sidebarOpen"
      class="md:hidden p-2 rounded-lg transition-all"
      :class="darkMode ? 'hover:bg-white/5 text-cyan-400' : 'hover:bg-blue-100 text-blue-600'">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>

    <!-- Logo -->
    <div class="flex items-center gap-2.5">
      <div class="relative w-8 h-8 rounded-lg flex items-center justify-center"
        :class="darkMode ? 'bg-gradient-to-br from-cyan-500/30 to-blue-600/20 border border-cyan-500/30' : 'bg-gradient-to-br from-blue-500/20 to-blue-700/10 border border-blue-400/30'">
        <div x-show="darkMode" class="absolute inset-0 rounded-lg" style="background: radial-gradient(circle at 50% 50%, rgba(34,211,238,0.2), transparent)"></div>
        <i data-lucide="network" class="w-4 h-4 relative z-10" :class="darkMode ? 'text-cyan-400' : 'text-blue-600'"></i>
      </div>
      <div>
        <div class="font-bold text-sm leading-none tracking-wide"
          :class="darkMode ? 'text-white' : 'text-slate-800'">
          Kentik
          <span :class="darkMode ? 'text-cyan-400' : 'text-blue-600'"> Enablement</span>
        </div>
        <div class="text-xs leading-none mt-0.5" :class="darkMode ? 'text-slate-500' : 'text-slate-400'">Portal</div>
      </div>
    </div>
  </div>

  <!-- Right controls -->
  <div class="flex items-center gap-2">
    <!-- Language toggle -->
    <button @click="lang = lang === 'en' ? 'th' : 'en'"
      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
      :class="darkMode ? 'bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300' : 'bg-white hover:bg-blue-50 border border-blue-200 text-slate-600'">
      <span class="text-sm">🌐</span>
      <span x-text="lang === 'en' ? 'TH' : 'EN'"></span>
    </button>

    <!-- Dark mode toggle -->
    <button @click="darkMode = !darkMode"
      class="p-2 rounded-lg transition-all"
      :class="darkMode ? 'bg-white/5 hover:bg-white/10 border border-white/10 text-yellow-400' : 'bg-white hover:bg-blue-50 border border-blue-200 text-slate-600'">
      <i :data-lucide="darkMode ? 'sun' : 'moon'" class="w-4 h-4"></i>
    </button>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════ LAYOUT ═══ -->
<div class="flex pt-14 min-h-screen">

  <!-- ═══════════════════════════════════════════════ SIDEBAR ═══ -->
  <aside class="fixed left-0 top-14 bottom-0 w-64 z-25 overflow-y-auto transition-transform duration-300"
    :class="[
      darkMode ? 'border-r border-cyan-950/50' : 'border-r border-blue-100',
      sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0',
      darkMode ? 'bg-navy-900/95' : 'bg-white/95',
      'backdrop-blur-xl'
    ]"
    style="z-index: 25;">

    <div class="p-4 space-y-1">
      <!-- Nav label -->
      <p class="text-xs font-semibold uppercase tracking-widest mb-3 px-2"
        :class="darkMode ? 'text-slate-600' : 'text-slate-400'">Navigation</p>

      <template x-for="item in navItems" :key="item.id">
        <button @click="activePage = item.id; if(isMobile) sidebarOpen = false"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200"
          :class="[
            activePage === item.id
              ? (darkMode ? 'sidebar-item-active-dark' : 'sidebar-item-active-light')
              : (darkMode ? 'text-slate-400 hover:text-slate-200 hover:bg-white/5' : 'text-slate-500 hover:text-slate-700 hover:bg-blue-50')
          ]">
          <i :data-lucide="item.icon" class="w-4 h-4 flex-shrink-0"></i>
          <span x-text="item.label[lang]"></span>
          <span x-show="item.badge" class="ml-auto text-xs px-1.5 py-0.5 rounded"
            :class="darkMode ? 'badge-cyan' : 'badge-blue'"
            x-text="item.badge"></span>
        </button>
      </template>

      <!-- Divider -->
      <div class="my-4 border-t" :class="darkMode ? 'border-white/5' : 'border-blue-100'"></div>
      <p class="text-xs font-semibold uppercase tracking-widest mb-3 px-2"
        :class="darkMode ? 'text-slate-600' : 'text-slate-400'">Progress</p>

      <!-- Progress -->
      <div class="px-2 py-3 rounded-lg" :class="darkMode ? 'bg-white/3' : 'bg-blue-50'">
        <div class="flex justify-between text-xs mb-2"
          :class="darkMode ? 'text-slate-400' : 'text-slate-500'">
          <span x-text="lang === 'en' ? 'Completion' : 'ความคืบหน้า'"></span>
          <span class="font-mono" :class="darkMode ? 'text-cyan-400' : 'text-blue-600'"
            x-text="completionPct + '%'"></span>
        </div>
        <div class="h-1.5 rounded-full" :class="darkMode ? 'bg-white/10' : 'bg-blue-100'">
          <div class="h-full rounded-full transition-all duration-500"
            :class="darkMode ? 'bg-gradient-to-r from-cyan-500 to-blue-500' : 'bg-gradient-to-r from-blue-500 to-blue-700'"
            :style="'width:' + completionPct + '%'"></div>
        </div>
        <p class="text-xs mt-2" :class="darkMode ? 'text-slate-500' : 'text-slate-400'">
          <span x-text="completedCount"></span> / <span x-text="totalChecks"></span>
          <span x-text="lang === 'en' ? ' items done' : ' รายการ'"></span>
        </p>
      </div>

      <!-- Quick stats -->
      <div class="mt-4 grid grid-cols-2 gap-2">
        <div class="p-2 rounded-lg text-center" :class="darkMode ? 'bg-white/3' : 'bg-blue-50'">
          <div class="text-lg font-bold" :class="darkMode ? 'text-cyan-400' : 'text-blue-600'">5</div>
          <div class="text-xs" :class="darkMode ? 'text-slate-500' : 'text-slate-400'"
            x-text="lang === 'en' ? 'Phases' : 'เฟส'"></div>
        </div>
        <div class="p-2 rounded-lg text-center" :class="darkMode ? 'bg-white/3' : 'bg-blue-50'">
          <div class="text-lg font-bold" :class="darkMode ? 'text-electric-400' : 'text-blue-700'">4</div>
          <div class="text-xs" :class="darkMode ? 'text-slate-500' : 'text-slate-400'"
            x-text="lang === 'en' ? 'Sections' : 'ส่วน'"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ════════════════════════════════════════════ MAIN CONTENT ═══ -->
  <main class="flex-1 md:ml-64 min-h-screen p-4 md:p-6 lg:p-8">

    <!-- ── ONBOARDING CHECKLIST PAGE ── -->
    <div x-show="activePage === 'checklist'" x-transition:enter="animate-fade-up">

      <!-- Page header -->
      <div class="mb-8">
        <div class="flex items-center gap-2 mb-2">
          <span class="kb-tag badge-cyan" x-text="lang === 'en' ? 'Interactive' : 'อินเทอร์แอคทีฟ'"></span>
          <span class="kb-tag badge-blue">v2.0</span>
        </div>
        <h1 class="text-2xl md:text-3xl font-bold mb-2" :class="darkMode ? 'text-white' : 'text-slate-800'">
          <span x-text="lang === 'en' ? 'Onboarding Checklist' : 'รายการตรวจสอบ Onboarding'"></span>
        </h1>
        <p class="text-sm md:text-base" :class="darkMode ? 'text-slate-400' : 'text-slate-500'"
          x-text="lang === 'en' ? 'Complete each phase to fully onboard Kentik Network Observability Platform.' : 'ทำตามแต่ละเฟสเพื่อ Onboard Kentik Network Observability Platform ให้ครบถ้วน'">
        </p>
      </div>

      <!-- Steps -->
      <div class="space-y-4">
        <template x-for="(phase, pi) in phases" :key="pi">
          <div class="rounded-xl overflow-hidden transition-all duration-300 cursor-pointer"
            :class="[
              darkMode ? 'card-dark card-hover-dark' : 'card-light card-hover-light',
              'transition-all-300'
            ]"
            @click="phase.open = !phase.open">

            <!-- Phase header -->
            <div class="flex items-center gap-4 p-4 md:p-5">
              <!-- Step number -->
              <div class="relative flex-shrink-0">
                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm"
                  :class="phaseComplete(phase)
                    ? (darkMode ? 'bg-green-500/20 border-2 border-green-400 text-green-400' : 'bg-green-50 border-2 border-green-500 text-green-600')
                    : (darkMode ? 'bg-cyan-500/15 border-2 border-cyan-500/40 text-cyan-400' : 'bg-blue-50 border-2 border-blue-400 text-blue-600')">
                  <span x-show="!phaseComplete(phase)" x-text="pi + 1"></span>
                  <i x-show="phaseComplete(phase)" data-lucide="check" class="w-5 h-5"></i>
                </div>
              </div>

              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <h3 class="font-semibold text-sm md:text-base" :class="darkMode ? 'text-white' : 'text-slate-800'"
                    x-text="phase.title[lang]"></h3>
                  <span class="text-xs px-2 py-0.5 rounded-full"
                    :class="phase.badgeClass"
                    x-text="phase.badge[lang]"></span>
                </div>
                <p class="text-xs mt-0.5 truncate" :class="darkMode ? 'text-slate-500' : 'text-slate-400'"
                  x-text="phase.desc[lang]"></p>
              </div>

              <!-- Progress mini -->
              <div class="flex items-center gap-3 flex-shrink-0">
                <div class="hidden sm:block text-right">
                  <div class="text-xs font-mono" :class="darkMode ? 'text-cyan-400' : 'text-blue-600'">
                    <span x-text="phase.items.filter(i => i.done).length"></span>/<span x-text="phase.items.length"></span>
                  </div>
                </div>
                <i :data-lucide="phase.open ? 'chevron-up' : 'chevron-down'"
                  class="w-4 h-4 transition-transform duration-200"
                  :class="darkMode ? 'text-slate-500' : 'text-slate-400'"></i>
              </div>
            </div>

            <!-- Phase progress bar -->
            <div class="h-0.5" :class="darkMode ? 'bg-white/5' : 'bg-blue-50'">
              <div class="h-full transition-all duration-500"
                :class="darkMode ? 'bg-gradient-to-r from-cyan-500 to-blue-500' : 'bg-gradient-to-r from-blue-400 to-blue-600'"
                :style="'width:' + Math.round(phase.items.filter(i => i.done).length / phase.items.length * 100) + '%'"></div>
            </div>

            <!-- Items -->
            <div x-show="phase.open"
              x-transition:enter="transition ease-out duration-200"
              x-transition:enter-start="opacity-0 -translate-y-2"
              x-transition:enter-end="opacity-100 translate-y-0"
              @click.stop>
              <div class="px-4 md:px-5 pb-4 pt-2 space-y-2">
                <template x-for="(item, ii) in phase.items" :key="ii">
                  <div class="flex items-start gap-3 p-3 rounded-lg transition-all duration-200 group cursor-pointer"
                    :class="[
                      item.done
                        ? (darkMode ? 'bg-green-500/8 border border-green-500/20' : 'bg-green-50 border border-green-200')
                        : (darkMode ? 'bg-white/3 border border-white/5 hover:border-cyan-500/20' : 'bg-blue-50/50 border border-transparent hover:border-blue-200'),
                    ]"
                    @click="item.done = !item.done; updateProgress()">

                    <!-- Checkbox -->
                    <div class="w-5 h-5 rounded flex items-center justify-center flex-shrink-0 mt-0.5 transition-all"
                      :class="item.done
                        ? (darkMode ? 'bg-green-500 border-green-500' : 'bg-green-500 border-green-500')
                        : (darkMode ? 'border border-slate-600 group-hover:border-cyan-500/60' : 'border-2 border-slate-300 group-hover:border-blue-400')">
                      <i x-show="item.done" data-lucide="check" class="w-3 h-3 text-white"></i>
                    </div>

                    <div class="flex-1 min-w-0">
                      <div class="text-sm font-medium leading-snug"
                        :class="[
                          item.done ? (darkMode ? 'line-through text-slate-500' : 'line-through text-slate-400') : (darkMode ? 'text-slate-200' : 'text-slate-700')
                        ]"

    get filteredKB() {
      if (!this.kbSearch) return this.kbCards;
      const q = this.kbSearch.toLowerCase();
      return this.kbCards.filter(c =>
        c.title.en.toLowerCase().includes(q) ||
        c.title.th.toLowerCase().includes(q) ||
        c.category.toLowerCase().includes(q) ||
        c.tags.some(t => t.toLowerCase().includes(q)) ||
        c.points.some(p => p.en.toLowerCase().includes(q) || p.th.toLowerCase().includes(q))
      );
    },

    phaseComplete(phase) {
      return phase.items.every(i => i.done);
    },

    updateProgress() {
      let total = 0, done = 0;
      this.phases.forEach(p => {
        p.items.forEach(i => { total++; if (i.done) done++; });
      });
      this.totalChecks = total;
      this.completedCount = done;
      this.completionPct = total > 0 ? Math.round(done / total * 100) : 0;
    },

    init() {
      this.updateProgress();
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
      this.$watch('activePage', () => { this.$nextTick(() => { if (window.lucide) lucide.createIcons(); }); });
      this.$watch('phases', () => { this.$nextTick(() => { if (window.lucide) lucide.createIcons(); }); }, { deep: true });
      this.$watch('darkMode', () => { this.$nextTick(() => { if (window.lucide) lucide.createIcons(); }); });
      this.$watch('lang', () => { this.$nextTick(() => { if (window.lucide) lucide.createIcons(); }); });
      window.addEventListener('resize', () => { if (window.innerWidth >= 768) this.sidebarOpen = false; });
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
